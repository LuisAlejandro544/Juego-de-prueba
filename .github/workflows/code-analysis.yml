name: Code Quality & Security Scan

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  analyze:
    name: Codebase Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Quality, Bug & Safety Scan
        run: |
          REPORT_FILE="code-analysis-report.txt"
          
          echo "======================================================================" > "$REPORT_FILE"
          echo "     REPORTE AUTOMATIZADO DE CALIDAD DE CÓDIGO Y SEGURIDAD (CI/CD)     " >> "$REPORT_FILE"
          echo "======================================================================" >> "$REPORT_FILE"
          echo "Fecha de Análisis (UTC): $(date -u)" >> "$REPORT_FILE"
          echo "Repositorio: ${{ github.repository }}" >> "$REPORT_FILE"
          echo "Rama / Commit: ${{ github.ref }} / ${{ github.sha }}" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          echo "1. ARCHIVOS QUE SUPERAN EL LÍMITE DE LÍNEAS DE CÓDIGO (Límite: 300)" >> "$REPORT_FILE"
          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          
          # Find all code files excluding build and gradle directories
          find . -type f \( -name "*.kt" -o -name "*.java" -o -name "*.kts" -o -name "*.gradle" \) -not -path "*/build/*" -not -path "*/.gradle/*" | while read -r file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 300 ]; then
              echo "  ⚠️  $file ($lines líneas) - ¡Supera el límite de 300 líneas!" >> "$REPORT_FILE"
            fi
          done
          
          # Check if any oversized files were found
          if ! grep -q "⚠️" "$REPORT_FILE"; then
            echo "  ✅ ¡Excelente! Ningún archivo de código supera el límite de 300 líneas." >> "$REPORT_FILE"
          fi
          echo "" >> "$REPORT_FILE"

          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          echo "2. SEGURIDAD: SECRETOS, LLAVES Y CREDENCIALES COMPROMETIDAS" >> "$REPORT_FILE"
          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          
          TEMP_SEC="security_matches.tmp"
          # Scan for high-entropy structures, AWS keys, JWTs, private keys, Firebase, or general key assignments
          find . -type f \( -name "*.kt" -o -name "*.java" -o -name "*.kts" -o -name "*.gradle" -o -name "*.xml" -o -name "*.json" \) -not -path "*/build/*" -not -path "*/.gradle/*" | while read -r file; do
            # 1. AWS Keys
            grep -Hn -E "AKIA[0-9A-Z]{16}" "$file" >> "$TEMP_SEC" || true
            # 2. JWT Tokens
            grep -Hn -E "eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*" "$file" >> "$TEMP_SEC" || true
            # 3. Google Services or Firebase Keys (e.g., AIzaSy...)
            grep -Hn -E "AIzaSy[A-Za-z0-9-_]{35}" "$file" >> "$TEMP_SEC" || true
            # 4. Standard hardcoded assignments to variables like key, secret, password, token
            grep -Hn -E "(api_?key|token|password|secret|private_?key|client_?secret)\s*=\s*\"[A-Za-z0-9+/]{10,}\"" "$file" | grep -v -E "(BuildConfig|System\.getenv|getenv)" >> "$TEMP_SEC" || true
          done
          
          if [ -s "$TEMP_SEC" ]; then
            cat "$TEMP_SEC" >> "$REPORT_FILE"
          else
            echo "  ✅ No se encontraron firmas de credenciales, llaves API de Google/AWS o secretos comprometidos." >> "$REPORT_FILE"
          fi
          rm -f "$TEMP_SEC"
          echo "" >> "$REPORT_FILE"

          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          echo "3. VULNERABILIDADES DE INFORMACIÓN Y ALMACENAMIENTO INSEGURO" >> "$REPORT_FILE"
          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          
          TEMP_STORAGE="storage_matches.tmp"
          # Scan for cleartext traffic (http:// instead of https://), insecure shared preferences, or backup configs
          find . -type f \( -name "*.kt" -o -name "*.java" -o -name "*.xml" -o -name "*.kts" \) -not -path "*/build/*" -not -path "*/.gradle/*" | while read -r file; do
            # 1. HTTP Insecure URLs
            grep -Hn -E "http://[A-Za-z0-9\.\-_]+" "$file" | grep -v -E "(w3\.org|schemas\.android|localhost|127\.0\.0\.1)" >> "$TEMP_STORAGE" || true
            # 2. Insecure SharedPreferences World modes
            grep -Hn -E "(MODE_WORLD_READABLE|MODE_WORLD_WRITEABLE)" "$file" >> "$TEMP_STORAGE" || true
            # 3. Backup permitted (vulnerable to adb backup extraction)
            grep -Hn "android:allowBackup=\"true\"" "$file" >> "$TEMP_STORAGE" || true
          done
          
          if [ -s "$TEMP_STORAGE" ]; then
            cat "$TEMP_STORAGE" >> "$REPORT_FILE"
          else
            echo "  ✅ Sin problemas detectados de almacenamiento inseguro o transmisiones en texto plano (HTTP)." >> "$REPORT_FILE"
          fi
          rm -f "$TEMP_STORAGE"
          echo "" >> "$REPORT_FILE"

          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          echo "4. CRIPTOGRAFÍA INSEGURA Y DEBILIDADES DE ALGORITMO" >> "$REPORT_FILE"
          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          
          TEMP_CRYPTO="crypto_matches.tmp"
          # Scan for outdated hash algorithms (MD5, SHA-1), static IVs, or Cipher ECB mode
          find . -type f \( -name "*.kt" -o -name "*.java" \) -not -path "*/build/*" -not -path "*/.gradle/*" | while read -r file; do
            # 1. Insecure Cryptographic hashes
            grep -Hn -i -E "(\"MD5\"|\"SHA-1\")" "$file" >> "$TEMP_CRYPTO" || true
            # 2. Insecure AES ECB block cipher mode
            grep -Hn -E "Cipher\.getInstance\(\"[AES|DES|RSA]+/[ECB|None]+" "$file" >> "$TEMP_CRYPTO" || true
            # 3. Hardcoded AES keys or IV vectors
            grep -Hn -i -E "(IvParameterSpec\(\s*\"|SecretKeySpec\(\s*\"|hardcoded.*salt)" "$file" >> "$TEMP_CRYPTO" || true
          done
          
          if [ -s "$TEMP_CRYPTO" ]; then
            cat "$TEMP_CRYPTO" >> "$REPORT_FILE"
          else
            echo "  ✅ No se encontraron algoritmos criptográficos débiles o configuraciones simétricas inseguras." >> "$REPORT_FILE"
          fi
          rm -f "$TEMP_CRYPTO"
          echo "" >> "$REPORT_FILE"

          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          echo "5. BUGS DE MEMORIA, FUGAS (LEAKS) Y RIESGOS DE RENDIMIENTO" >> "$REPORT_FILE"
          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          
          TEMP_BUGS="bugs_matches.tmp"
          # Scan for static references to Context, Activity, or Views that cause leak, or raw Thread.sleep blocking UI
          find . -type f \( -name "*.kt" -o -name "*.java" \) -not -path "*/build/*" -not -path "*/.gradle/*" | while read -r file; do
            # 1. Memory Leak Hazards (Static context/activity/views)
            grep -Hn -E "(static\s+Context\s+|static\s+Activity\s+|static\s+View\s+|companion\s+object.*var\s+context\s*:|companion\s+object.*var\s+activity\s*:)" "$file" >> "$TEMP_BUGS" || true
            # 2. Blocking thread delays on Main Threads
            grep -Hn -E "Thread\.sleep\(" "$file" | grep -v -E "(Test|test)" >> "$TEMP_BUGS" || true
            # 3. Unclosed system resources (raw InputStream/OutputStream or Cursor without close)
            grep -Hn -E "(\.open\([^)]*\)|\.query\([^)]*\))" "$file" | grep -v -E "(\.use\s*\{|\.close\(\))" >> "$TEMP_BUGS" || true
          done
          
          if [ -s "$TEMP_BUGS" ]; then
            cat "$TEMP_BUGS" >> "$REPORT_FILE"
          else
            echo "  ✅ Sin riesgos evidentes detectados de fugas de memoria (Context) o bloqueos del hilo principal." >> "$REPORT_FILE"
          fi
          rm -f "$TEMP_BUGS"
          echo "" >> "$REPORT_FILE"

          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          echo "6. COMENTARIOS PENDIENTES Y REFACTORIZACIONES (TODO / FIXME)" >> "$REPORT_FILE"
          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          
          TEMP_TODO="todo_matches.tmp"
          find . -type f \( -name "*.kt" -o -name "*.java" -o -name "*.kts" -o -name "*.gradle" -o -name "*.md" \) -not -path "*/build/*" -not -path "*/.gradle/*" | while read -r file; do
            if grep -q -i -E "(TODO|FIXME)" "$file"; then
              echo "  📂 En el archivo: $file" >> "$TEMP_TODO"
              grep -Hni -E "(TODO|FIXME)" "$file" | sed 's/^/    - /' >> "$TEMP_TODO"
            fi
          done
          
          if [ -s "$TEMP_TODO" ]; then
            cat "$TEMP_TODO" >> "$REPORT_FILE"
          else
            echo "  ✅ No se encontraron tareas TODO o FIXME pendientes en el código analizado." >> "$REPORT_FILE"
          fi
          rm -f "$TEMP_TODO"
          echo "" >> "$REPORT_FILE"

          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          echo "7. MALAS PRÁCTICAS SINTÁCTICAS O DE DEPURACIÓN" >> "$REPORT_FILE"
          echo "----------------------------------------------------------------------" >> "$REPORT_FILE"
          
          TEMP_PRACTICE="practice_matches.tmp"
          find . -type f \( -name "*.kt" -o -name "*.java" \) -not -path "*/build/*" -not -path "*/.gradle/*" | while read -r file; do
            # Check for printStackTrace() or System.out.print() or println() in Kotlin/Java files
            if grep -q -E "(printStackTrace\(\)|System\.out\.print|println\()" "$file"; then
              # Avoid matching standard tests or gradle build configurations
              if [[ "$file" != *"Test"* && "$file" != *".kts"* ]]; then
                echo "  ⚠️  Depuración cruda en $file (se sugiere usar clases Log o Timber):" >> "$TEMP_PRACTICE"
                grep -Hn -E "(printStackTrace\(\)|System\.out\.print|println\()" "$file" | sed 's/^/    - /' >> "$TEMP_PRACTICE" || true
              fi
            fi
          done
          
          if [ -s "$TEMP_PRACTICE" ]; then
            cat "$TEMP_PRACTICE" >> "$REPORT_FILE"
          else
            echo "  ✅ No se detectaron malas prácticas obvias de depuración en los archivos principales." >> "$REPORT_FILE"
          fi
          rm -f "$TEMP_PRACTICE"
          echo "" >> "$REPORT_FILE"

          echo "======================================================================" >> "$REPORT_FILE"
          echo "                     FIN DEL REPORTE AUTOMÁTICO                       " >> "$REPORT_FILE"
          echo "======================================================================" >> "$REPORT_FILE"
          
          cat "$REPORT_FILE"

      - name: Upload Quality and Security Report
        uses: actions/upload-artifact@v4
        with:
          name: code-analysis-report
          path: code-analysis-report.txt
          if-no-files-found: error
          retention-days: 14
